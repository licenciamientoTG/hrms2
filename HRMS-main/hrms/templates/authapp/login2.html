<!DOCTYPE html>
<html lang="es">
<head>
    <title>Login</title>
</head>
<body>
    <h2>Iniciar Sesión</h2>
    {% if messages %}
        {% for message in messages %}
            <p style="color: red;">{{ message }}</p>
        {% endfor %}
    {% endif %}
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Ingresar</button>
    </form>
    <p>¿No tienes cuenta? <a href="{% url 'register' %}">Regístrate</a></p>
</body>
</html>
